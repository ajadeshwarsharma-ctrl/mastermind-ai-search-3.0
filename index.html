<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mastermind X - Ajadeshwar Search Engine</title>
    <meta name="description" content="Mastermind X is a fast search engine by Ajadeshwar Digital. Search the web with Mastermind X.">
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <header class="topbar">
  <div class="top-logo">MASTERMIND AJADESHWAR DIGITAL</div>

  <div class="top-buttons">
    <button id="wallpaperBtn">🎨 Change Wallpaper</button>
    <button id="signinBtn">Sign In</button>
  </div>
</header>
<div id="profileCard" class="profile-card" style="display:none;">

    <img id="profilePhoto"
    width="70"
    style="border-radius:50%;">

    <h3 id="profileName">User</h3>

    <p id="profileEmail">
    Email
    </p>

    <button id="accountSettings">
        ⚙️ Account Settings
    </button>

    <button id="logoutBtn">
        🚪 Logout
    </button>

</div>
<main id="homePage" class="home-page">

  <h1 class="mastermind">Mastermind</h1>
  <div class="ajadeshwar">Ajadeshwar</div>

  <div class="search-wrap">
    <input id="searchBox" autocomplete="off" placeholder="Enter your search...">
    <div id="suggestions"></div>
  </div>

  <div class="quick-buttons">
    <button data-search="YouTube">YouTube</button>
    <button data-search="Instagram">Instagram</button>
    <button data-search="Facebook">Facebook</button>
    <button data-search="ChatGPT">ChatGPT</button>
   <a href="MastermindX.apk.apk" download>
  <button>📱 DOWNLOAD MASTERMIND X APK</button>
</a>
  </div>

</main>

<section id="resultsPage" class="results-page">

  <button id="backBtn" class="back-btn">← Back</button>

  <div class="result-search">
    <input id="resultSearch" placeholder="Search again...">
    <button id="searchBtn">Search</button>
  </div>

  <h3 id="resultTitle"></h3>

  <div id="results"></div>

  <div class="history">
    <h3>🕘 Search History</h3>
    <div id="historyList"></div>
  </div>

</section>


<div id="wallpaperModal" class="modal">

  <div class="modal-box">

    <h2>Choose Wallpaper 🌍</h2>

    <div class="wallpaper-grid">
      <button data-wall="earth">🌍 Earth</button>
      <button data-wall="nature">🌿 Nature</button>
      <button data-wall="space">🌌 Space</button>
      <button data-wall="city">🌆 City</button>
      <button data-wall="ocean">🌊 Ocean</button>
      <button data-wall="default">⬜ Default</button>
    </div>

    <button id="closeWallpaper" class="close-btn">Close</button>

  </div>

</div>


<div id="loginModal" class="modal" style="display:none !important;">
  <div class="modal-box">

    <h2>Mastermind Sign In 🔐</h2>

  <h2>Mastermind Login 🔐</h2>

<button id="googleLoginBtn" class="login-btn">
🔵 Sign in with Google
</button>>

    <button id="closeLogin" class="close-btn">
      Close
    </button>

  </div>

</div>
    <script type="module" src="./script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

  </body>
  
</html>
